<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Валидатор учетных данных</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <div class="form-container">
    <h1 class="title">Регистрация</h1>
    <div class="block"><input class="block-login" type="text" placeholder="Логин" /></div>
    <div class="block"><input class="block-password" type="password" placeholder="Пароль" /></div>
    <div class="block"><input class="block-confirm-password" type="password" placeholder="Подтвердите пароль" /></div>
    <div class="block"><button id="registerBtn" type="button">Зарегистрироваться</button></div>
    <div class="message-box">
      <div class="success"></div>
      <div class="error"></div>
    </div>
  </div>
</body>
</html>
